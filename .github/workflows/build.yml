name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        # npm's Windows-generated lock omits a pair of Linux-only optional
        # binaries; install resolves those runner-specific packages safely.
        run: npm install --ignore-scripts
      - name: Check Astro project
        run: npm run check
      - name: Build static site
        run: npm run build
